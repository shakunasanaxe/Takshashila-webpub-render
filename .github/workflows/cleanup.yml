name: Cleanup old outputs

# Deletes output ZIPs from gh-pages that are older than 7 days.
on:
  schedule:
    - cron: "0 3 * * *"   # 3 AM UTC daily
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove outputs older than 7 days
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            echo "No gh-pages branch yet — nothing to clean."
            exit 0
          fi

          git worktree add /tmp/ghpages origin/gh-pages
          cd /tmp/ghpages

          CUTOFF=$(date -d '7 days ago' +%s)
          DELETED=0

          if [ -d outputs ]; then
            for dir in outputs/*/; do
              [ -d "$dir" ] || continue
              DIR_MTIME=$(stat -c %Y "$dir")
              if [ "$DIR_MTIME" -lt "$CUTOFF" ]; then
                rm -rf "$dir"
                DELETED=$((DELETED + 1))
              fi
            done
          fi

          if [ "$DELETED" -gt 0 ]; then
            git add -A
            git commit -m "cleanup: removed $DELETED expired output(s)"
            git push origin HEAD:gh-pages
            echo "Removed $DELETED expired output director(ies)."
          else
            echo "Nothing to clean up."
          fi
