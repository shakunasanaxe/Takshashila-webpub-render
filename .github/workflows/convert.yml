name: Convert Document

# Triggered by the web frontend via the GitHub Actions API.
# All inputs are passed from the form fields.
on:
  workflow_dispatch:
    inputs:
      google_doc_url:
        description: "Google Docs share URL"
        required: true
      title:
        description: "Title"
        required: true
      subtitle:
        description: "Subtitle"
        required: false
        default: ""
      authors:
        description: "Authors (comma-separated)"
        required: false
        default: ""
      date:
        description: "Date (YYYY-MM-DD)"
        required: false
        default: ""
      tldr:
        description: "TL;DR summary"
        required: false
        default: ""
      categories:
        description: "Categories (comma-separated)"
        required: false
        default: ""
      doctype:
        description: "Document type"
        required: false
        default: ""
      docversion:
        description: "Version string"
        required: false
        default: ""
      pdf_filename:
        description: "Output filename stem (no spaces or extension)"
        required: true
        default: "document"
      run_token:
        description: "Unique token generated by the frontend for polling (do not edit)"
        required: true

permissions:
  contents: write   # needed to push the output to gh-pages

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can work with gh-pages branch

      # ── System tools (font infrastructure only — LaTeX via TinyTeX below) ──
      - name: Install font tools and system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fontconfig wget unzip fonts-texgyre

      # ── Quarto + TinyTeX ────────────────────────────────────────────────────
      - name: Set up Quarto with TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"
          tinytex: true   # installs TinyTeX into ~/.TinyTeX

      # TinyTeX installs to ~/.TinyTeX — add its bin dir to PATH
      - name: Add TinyTeX to PATH
        run: echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH

      # Install xelatex + essential packages into TinyTeX.
      # TinyTeX auto-installs missing packages at render time, but xetex
      # (the format itself) and the fonts must be present upfront.
      - name: Install xelatex and core LaTeX packages
        run: |
          tlmgr install xetex collection-fontsrecommended \
            biber biblatex sidenotes marginnote tcolorbox enotez lm

      - name: Install Inter font
        run: |
          wget -q "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip"
          unzip -q Inter-4.0.zip -d /tmp/inter
          find /tmp/inter -name "*.ttf" -exec sudo cp {} /usr/local/share/fonts/ \;
          fc-cache -f
          rm -rf Inter-4.0.zip /tmp/inter

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Conversion ──────────────────────────────────────────────────────────
      - name: Run conversion
        env:
          DOC_URL:     ${{ inputs.google_doc_url }}
          TITLE:       ${{ inputs.title }}
          SUBTITLE:    ${{ inputs.subtitle }}
          AUTHORS:     ${{ inputs.authors }}
          DATE:        ${{ inputs.date }}
          TLDR:        ${{ inputs.tldr }}
          CATEGORIES:  ${{ inputs.categories }}
          DOCTYPE:     ${{ inputs.doctype }}
          DOCVERSION:  ${{ inputs.docversion }}
          PDF_FILENAME: ${{ inputs.pdf_filename }}
        run: |
          python app/cli.py \
            --url         "$DOC_URL"      \
            --title       "$TITLE"        \
            --subtitle    "$SUBTITLE"     \
            --authors     "$AUTHORS"      \
            --date        "$DATE"         \
            --tldr        "$TLDR"         \
            --categories  "$CATEGORIES"   \
            --doctype     "$DOCTYPE"      \
            --docversion  "$DOCVERSION"   \
            --pdf-filename "$PDF_FILENAME" \
            --render-pdf  \
            --output /tmp/output.zip

      # ── Publish output to gh-pages ─────────────────────────────────────────
      - name: Publish output to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Sanitise the token to safe directory characters
          RUN_TOKEN=$(echo "${{ inputs.run_token }}" | tr -dc 'a-zA-Z0-9-')

          # Set up gh-pages as a git worktree so we can commit there without
          # disrupting the current checkout of main.
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/ghpages origin/gh-pages
          else
            # First-ever run: create the orphan branch
            git worktree add --orphan -b gh-pages /tmp/ghpages
            touch /tmp/ghpages/.nojekyll
            cd /tmp/ghpages
            git add .nojekyll
            git commit -m "chore: initialize gh-pages"
            git push origin gh-pages
            cd -
          fi

          mkdir -p /tmp/ghpages/outputs/${RUN_TOKEN}
          cp /tmp/output.zip /tmp/ghpages/outputs/${RUN_TOKEN}/document.zip

          cd /tmp/ghpages
          git add outputs/${RUN_TOKEN}/document.zip
          git commit -m "output: ${RUN_TOKEN}"
          git push origin HEAD:gh-pages
